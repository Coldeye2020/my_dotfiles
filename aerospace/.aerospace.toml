config-version = 2

after-startup-command = []

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 20

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

persistent-workspaces = ["U", "I", "O", "P", "B", "N", "M"]

on-mode-changed = []

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 5
    inner.vertical =   5
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

[mode.main.binding]
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-u = 'workspace U'
    alt-i = ['workspace I', 'layout accordion horizontal vertical']
    alt-o = 'workspace O'
    alt-p = 'workspace P'
    alt-b = 'workspace B'
    alt-n = 'workspace N'
    alt-m = 'workspace M'

    alt-shift-u = 'move-node-to-workspace U'
    alt-shift-i = ['move-node-to-workspace I', 'workspace I', 'layout accordion horizontal vertical']
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-m = 'move-node-to-workspace M'

    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

[workspace-to-monitor-force-assignment]
"U" = ["LS27D80xU", "DELL U2723QX"]
"I" = ["LS27D80xU", "DELL U2723QX"]
"O" = ["LS27D80xU", "DELL U2723QX"]
"P" = ["LS27D80xU", "DELL U2723QX"]
"B" = "Built-in"
"N" = "Built-in"
"M" = "Built-in"


[[on-window-detected]]
if.app-id = "com.tencent.xinWeChat"
run = ["layout floating", "move-node-to-workspace N"]

[[on-window-detected]]
if.app-id = "com.tencent.WeWorkMac"
run = ["layout floating", "move-node-to-workspace N"]

[[on-window-detected]]
if.app-id = "com.cmuxterm.app"
run = ["layout tiling", "move-node-to-workspace U"]

[[on-window-detected]]
if.app-id = "com.jetbrains.intellij"
run = ["layout tiling", "move-node-to-workspace I"]

[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = ["layout tiling", "move-node-to-workspace O"]

[[on-window-detected]]
if.app-id = "com.todesktop.230313mzl4w4u92"
run = ["layout tiling", "move-node-to-workspace P"]

[[on-window-detected]]
if.app-id = "com.microsoft.VSCode"
run = ["layout tiling", "move-node-to-workspace P"]

[[on-window-detected]]
if.app-id = "com.anthropic.claudefordesktop"
run = ["layout tiling", "move-node-to-workspace M"]

[[on-window-detected]]
if.app-id = "abnerworks.Typora"
run = ["layout tiling", "move-node-to-workspace B"]

[[on-window-detected]]
run = "layout floating"
